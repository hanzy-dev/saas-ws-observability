apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: ws-observability
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
            http:

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces

    metrics_generator:
      storage:
        path: /var/tempo/generator
      processor:
        span_metrics:
          dimensions:
            - service.name
            - http.method